<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===================================================================
    SEO — Título y descripción
    Reemplazá TU-DOMINIO.com por tu dominio real una vez que la tienda esté
    publicada (Vercel te da uno gratis tipo tutienda.vercel.app, pero para
    SEO y para que WhatsApp arme bien la vista previa conviene un dominio
    propio, ej. bellaunas.com.ar).
    =================================================================== -->
    <title>Bella Uñas | Insumos profesionales para uñas acrílicas y nail art</title>
    <meta
      name="description"
      content="Comprá acrílicos, esmaltes semipermanentes, herramientas, lámparas UV/LED y kits profesionales para nail artists. Envío a todo el país, atención por WhatsApp y stock actualizado todos los días."
    />
    <meta
      name="keywords"
      content="uñas acrílicas, insumos para uñas, nail art, esmalte semipermanente, polvo acrílico, monómero, lámpara uv led uñas, kit nail art, productos para manicura profesional"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Bella Uñas" />
    <link rel="canonical" href="https://TU-DOMINIO.com/" />

    <!-- Idioma / región -->
    <meta name="geo.region" content="AR" />
    <meta name="theme-color" content="#241220" />

    <!-- ===================================================================
    Open Graph — esto es lo que hace que WhatsApp, Instagram, Facebook, etc.
    muestren una vista previa (imagen + título + descripción) en vez de
    solo el link pelado cuando alguien comparte tu tienda.
    IMPORTANTE: og:image y og:url tienen que ser URLs absolutas (con
    https://TU-DOMINIO.com), no rutas relativas — si no, WhatsApp no puede
    encontrarlas. Actualizalas cuando tengas el dominio final.
    =================================================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bella Uñas" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:url" content="https://TU-DOMINIO.com/" />
    <meta property="og:title" content="Bella Uñas | Insumos profesionales para uñas acrílicas y nail art" />
    <meta
      property="og:description"
      content="Acrílicos, esmaltes semipermanentes, herramientas y kits para nail artists. Envíos a todo el país y atención por WhatsApp."
    />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=1200&h=630&q=80"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Manicura profesional con uñas acrílicas" />

    <!-- Twitter Card (WhatsApp a veces también la usa como respaldo) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bella Uñas | Insumos profesionales para uñas acrílicas y nail art" />
    <meta
      name="twitter:description"
      content="Acrílicos, esmaltes semipermanentes, herramientas y kits para nail artists. Envíos a todo el país y atención por WhatsApp."
    />
    <meta
      name="twitter:image"
      content="https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=1200&h=630&q=80"
    />

    <!-- ===================================================================
    Datos estructurados (JSON-LD) — ayuda a Google a entender que esto es
    una tienda, y puede mostrar info enriquecida (nombre, logo, redes) en
    los resultados de búsqueda.
    =================================================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Bella Uñas",
        "description": "Tienda online de insumos profesionales para uñas acrílicas, esmaltes semipermanentes, nail art y herramientas para nail artists.",
        "url": "https://TU-DOMINIO.com/",
        "image": "https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=1200&q=80",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "AR"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
